<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  ROLE-BASED ACCESS CONTROL (RBAC) — PHP-READY LAYER             ║
  ║  HOW TO USE:                                                     ║
  ║  Paste this entire <script> block into your existing HTML file,  ║
  ║  AFTER the existing <script> block (just before </body>).        ║
  ║                                                                  ║
  ║  WHEN MIGRATING TO PHP:                                          ║
  ║  Replace `currentUser` with PHP session output like:             ║
  ║    const currentUser = <?php echo json_encode([                  ║
  ║      'id'         => $_SESSION['user_id'],                       ║
  ║      'name'       => $_SESSION['user_name'],                     ║
  ║      'role'       => $_SESSION['user_role'],                     ║
  ║      'dept'       => $_SESSION['user_dept'],                     ║
  ║      'employeeId' => $_SESSION['employee_id']                    ║
  ║    ]); ?>;                                                       ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<script>
// ============================================================
// SECTION 1 — SIMULATED SESSION USER
// Replace this block with PHP session data in production.
// PHP equivalent: $user = $_SESSION['user'];
// ============================================================

const currentUser = {
  id:         "USR-001",
  name:       "Admin User",
  role:       "super_admin", // Change to test different roles (see RBAC.roles below)
  dept:       "HR",
  employeeId: "E0001"
};

// ============================================================
// SECTION 2 — RBAC CONFIGURATION
// Defines every role and which page IDs each role may access.
// In PHP, this could live in a DB table `roles_permissions`
// and be fetched once per session to avoid repeated queries.
// ============================================================

const RBAC = {
  roles: {

    // Full system access — no restrictions
    super_admin: {
      label:        "Super Administrator",
      allowedPages: "*", // Wildcard = all pages
      canCreate:    true,
      canEdit:      true,
      canDelete:    true,
      canApprove:   true
    },

    // HR operations: everything except system admin panels
    hr_manager: {
      label: "HR Manager",
      allowedPages: [
        "dashboard",
        "company-profile", "org-chart", "departments", "job-positions", "branch-offices",
        "employee-directory", "add-employee", "employment-types",
        "probation-tracker", "contract-renewals", "former-employees",
        "document-vault", "asset-tracking",
        "job-vacancies", "candidates", "interview-tracker",
        "Promote/Demote", "transfers",
        "shift-management", "daily-attendance", "overtime-requests", "attendance-reports",
        "leave-types", "leave-requests", "leave-entitlement",
        "medical-claims",
        "disciplinary-actions", "grievances", "termination", "exit-clearance",
        "training-needs", "course-catalog", "training-schedule", "learning-history",
        "kpi-setup", "performance-reviews", "360-feedback", "succession-planning", "performance-reports",
        "hr-analytics", "custom-reports"
      ],
      canCreate:  true,
      canEdit:    true,
      canDelete:  false, // HR managers cannot delete records
      canApprove: true
    },

    // Finance: read-only view of compensation-related pages
    finance_officer: {
      label: "Finance Officer",
      allowedPages: [
        "dashboard",
        "employee-directory",
        "leave-entitlement",
        "medical-claims",
        "hr-analytics", "custom-reports"
      ],
      canCreate:  false,
      canEdit:    true,  // Can edit financial fields
      canDelete:  false,
      canApprove: true   // Can approve financial settlements
    },

    // Department head: manages own team, no org-wide settings
    dept_head: {
      label: "Department Head",
      allowedPages: [
        "dashboard", "org-chart",
        "employee-directory",
        "probation-tracker", "contract-renewals",
        "daily-attendance", "overtime-requests", "attendance-reports",
        "leave-requests", "leave-entitlement",
        "medical-claims",
        "disciplinary-actions", "grievances",
        "training-needs", "training-schedule", "learning-history",
        "performance-reviews", "360-feedback", "performance-reports",
        "hr-analytics"
      ],
      canCreate:  false,
      canEdit:    false,
      canDelete:  false,
      canApprove: true  // Can approve leave/OT for their team
    },

    // Recruiter: limited to talent acquisition pipeline only
    recruiter: {
      label: "Recruiter",
      allowedPages: [
        "dashboard",
        "employee-directory",
        "job-vacancies", "candidates", "interview-tracker",
        "hr-analytics"
      ],
      canCreate:  true,  // Can post vacancies and add candidates
      canEdit:    true,
      canDelete:  false,
      canApprove: false
    },

    // Employee self-service: only own profile and request submission
    employee: {
      label: "Employee (Self-Service)",
      allowedPages: [
        "dashboard",
        "leave-requests",
        "medical-claims",
        "training-schedule", "learning-history",
        "performance-reviews"
      ],
      canCreate:  true,  // Can submit own requests
      canEdit:    false,
      canDelete:  false,
      canApprove: false
    }
  }
};


// ============================================================
// SECTION 3 — ACCESS CHECK HELPERS
// Utility functions used throughout the RBAC system.
// In PHP, these would be helper methods in an Auth class.
// ============================================================

// Returns true if the current user's role permits viewing `pageId`.
// PHP equivalent: Auth::canViewPage($pageId)
function hasPageAccess(pageId) {
  const role = RBAC.roles[currentUser.role];
  if (!role) return false;                          // Unknown role = deny all
  if (role.allowedPages === "*") return true;       // Super admin = allow all
  return role.allowedPages.includes(pageId);
}

// Returns true if the current user may perform a given action.
// Usage: hasPermission('canDelete'), hasPermission('canApprove')
// PHP equivalent: Auth::can($action)
function hasPermission(action) {
  const role = RBAC.roles[currentUser.role];
  if (!role) return false;
  return role[action] === true;
}


// ============================================================
// SECTION 4 — SIDEBAR GATING
// Hides nav items the current user has no access to.
// In PHP, the server would simply not render these <li> elements.
// Here we do it client-side as a progressive-enhancement layer.
// ============================================================

function applyRBACToSidebar() {
  const role = RBAC.roles[currentUser.role];
  if (!role) return;
  if (role.allowedPages === "*") return; // Super admin — nothing to hide

  // Step 1: Hide individual sub-links the user cannot access
  document.querySelectorAll('.sub-link').forEach(link => {
    const match = link.getAttribute('onclick')?.match(/goPage\('([^']+)'/);
    if (!match) return;
    const pageId = match[1];
    if (!role.allowedPages.includes(pageId)) {
      link.style.display = 'none'; // Remove restricted nav item from view
    }
  });

  // Step 2: Hide any nav-group whose every sub-link has been hidden
  document.querySelectorAll('.nav-group').forEach(group => {
    if (group.querySelector('.dash-link')) return; // Never hide the Dashboard link
    const links = group.querySelectorAll('.sub-link');
    if (links.length === 0) return;
    const allHidden = Array.from(links).every(l => l.style.display === 'none');
    if (allHidden) group.style.display = 'none'; // Collapse the entire nav section
  });

  // Step 3: Hide orphaned section labels (e.g., "Operations") if all groups below are hidden
  document.querySelectorAll('.nav-label').forEach(label => {
    let next = label.nextElementSibling;
    let hasVisible = false;
    while (next && !next.classList.contains('nav-label')) {
      if (next.classList.contains('nav-group') && next.style.display !== 'none') {
        hasVisible = true;
        break;
      }
      next = next.nextElementSibling;
    }
    if (!hasVisible) label.style.display = 'none'; // No visible groups — remove heading too
  });
}


// ============================================================
// SECTION 5 — goPage() INTERCEPTOR
// Wraps the existing goPage() function to enforce access checks
// before any page is rendered. The original function is untouched.
// PHP equivalent: middleware that checks Auth::canViewPage() before
// routing to the controller action.
// ============================================================

(function () {
  const _originalGoPage = window.goPage; // Keep a reference to the original function

  window.goPage = function (id, el) {
    if (!hasPageAccess(id)) {
      showAccessDenied(id); // Render the 403-style denial screen
      return;               // Stop — do not call the original renderer
    }
    _originalGoPage(id, el); // Access granted — proceed as normal
  };
})();


// ============================================================
// SECTION 6 — ACCESS DENIED SCREEN
// Rendered in-place when a user navigates to a restricted page.
// PHP equivalent: redirect to /403.php or render a 403 view.
// ============================================================

function showAccessDenied(pageId) {
  // Deactivate every page panel
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  // Create the denied-page panel once; reuse it on repeat attempts
  let deniedPage = document.getElementById('p-access-denied');
  if (!deniedPage) {
    deniedPage = document.createElement('div');
    deniedPage.id = 'p-access-denied';
    deniedPage.className = 'page';
    document.getElementById('content-area').appendChild(deniedPage);
  }

  // Render the denial message with the user's current role for context
  deniedPage.innerHTML = `
    <div style="
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; min-height:60vh; gap:20px; text-align:center;
    ">
      <div style="
        width:72px; height:72px; border-radius:20px;
        background:#fee2e2; display:flex; align-items:center; justify-content:center;
      ">
        <i data-lucide="shield-off" size="32" style="color:#dc2626;"></i>
      </div>
      <div>
        <div style="font-size:1.25rem; font-weight:800; color:#0f172a;">Access Restricted</div>
        <div style="font-size:.82rem; color:#64748b; margin-top:8px; max-width:380px; line-height:1.6;">
          Your current role
          <b style="color:#0f172a;">(${RBAC.roles[currentUser.role]?.label || currentUser.role})</b>
          does not have permission to view this module.
        </div>
        <div style="font-size:.72rem; color:#94a3b8; margin-top:6px;">
          Contact your system administrator to request elevated access.
        </div>
      </div>
      <div style="display:flex; gap:10px; margin-top:4px;">
        <button class="btn btn-secondary" onclick="history.back()">
          <i data-lucide="arrow-left" size="13"></i> Go Back
        </button>
        <button class="btn btn-primary" onclick="window.goPage('dashboard')">
          <i data-lucide="layout-dashboard" size="13"></i> Dashboard
        </button>
      </div>
    </div>`;

  deniedPage.classList.add('active');
  document.getElementById('page-title').textContent = 'Access Denied';
  lucide.createIcons(); // Re-render icons injected into the denial screen
}


// ============================================================
// SECTION 7 — TOPBAR IDENTITY SYNC
// Updates the topbar user name, role label, and avatar initials
// to reflect the active session. In PHP, these would be echoed
// directly into the HTML template from $_SESSION.
// ============================================================

function applyUserIdentityToTopbar() {
  const nameEl   = document.querySelector('.u-name');
  const roleEl   = document.querySelector('.u-role');
  const avatarEl = document.querySelector('.topbar-user-avatar');

  // Sync display name from session user
  if (nameEl) nameEl.textContent = currentUser.name;

  // Show the human-readable role label, not the raw role key
  if (roleEl) roleEl.textContent = RBAC.roles[currentUser.role]?.label || currentUser.role;

  // Derive two-letter initials from the user's full name
  if (avatarEl) {
    const initials = currentUser.name
      .split(' ')
      .map(n => n[0])
      .join('')
      .substring(0, 2)
      .toUpperCase();
    avatarEl.textContent = initials;
  }
}


// ============================================================
// SECTION 8 — BOOTSTRAP
// Runs after the DOM is fully loaded.
// Applies identity + sidebar gating in sequence.
// In PHP, identity would already be baked into the rendered HTML;
// only applyRBACToSidebar() would be needed client-side (or none
// if nav rendering is fully server-controlled).
// ============================================================

document.addEventListener('DOMContentLoaded', () => {
  applyUserIdentityToTopbar(); // Reflect active session in the topbar
  applyRBACToSidebar();        // Hide nav items the user may not access
});
</script>
