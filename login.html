<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGT Enterprise | Secure Access</title>
    <!-- Premium Font Stack -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #15b201;
            --primary-dark: #0e8a00;
            --primary-light: #f1fcf0;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --bg-body: #f8fafc;
            --radius: 14px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        .auth-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
            width: 100%;
        }

        /* --- LEFT SIDE: BRAND --- */
        .brand-panel {
            background: linear-gradient(135deg, #15b201 0%, #0d8a00 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* Subtle Bull Watermark Background */
        .brand-panel::before {
            content: '';
            position: absolute;
            bottom: -10%; 
            right: 0;
            width: 350px;
            height: 350px;
            background: white;
            opacity: 0.1;
            border-radius: 50%;
            pointer-events: none;
        }

        .brand-content { position: relative; z-index: 5; max-width: 400px; }

        .logo-box {
            background: white;
            display: inline-flex;
            padding: 10px 18px;
            border-radius: 12px;
            margin-bottom: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }
        
        .logo-box span {
            color: var(--primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .brand-panel h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 20px;
            letter-spacing: -0.04em;
        }

        .brand-panel p {
            font-size: 1.1rem;
            opacity: 0.85;
            line-height: 1.5;
            font-weight: 400;
        }

        /* --- RIGHT SIDE: FORM --- */
        .form-panel {
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Vertically Centers */
            align-items: center;     /* Horizontally Centers */
            padding: 40px;
            position: relative;
        }

        .form-card {
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        /* View Switching Logic */
        .view {
            display: none;
            animation: slideIn 0.5s ease-out forwards;
        }
        .view.active { display: block; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header { margin-bottom: 35px; }
        .form-header h2 { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2rem; 
            font-weight: 800; 
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .form-header p { color: var(--text-muted); font-size: 0.95rem; }

        /* Modern Input Styling */
        .input-group { margin-bottom: 24px; position: relative; }
        
        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 10px;
            padding-left: 2px;
        }

        .input-ctrl {
            width: 100%;
            height: 58px;
            background: #f8fafc;
            border: 2px solid #f1f5f9;
            border-radius: var(--radius);
            padding: 0 20px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .input-ctrl:focus {
            outline: none;
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            font-size: 0.9rem;
        }

        .checkbox-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
        }

        .checkbox-wrap input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }

        /* Premium Button */
        .btn-primary {
            width: 100%;
            height: 60px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: var(--transition);
            box-shadow: 0 10px 20px -5px rgba(21, 178, 1, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(21, 178, 1, 0.4);
        }

        .btn-link {
            background: none;
            border: none;
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .footer-note {
            position: absolute;
            bottom: 40px;
            color: #cbd5e1;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 1024px) {
            .brand-panel { padding: 40px; }
            .brand-panel h1 { font-size: 2.8rem; }
        }

        @media (max-width: 850px) {
            .auth-container { grid-template-columns: 1fr; }
            .brand-panel { display: none; }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <!-- Sidebar -->
    <aside class="brand-panel">
        <div class="brand-content">
            <div class="logo-box">
                <img src="assets/bgt.png" alt="BGT Logo">
            </div>
            <h1>User Portal.</h1>
            <p>Welcome back. Secure access for Bull Green Trading members.</p>
        </div>
    </aside>

    <!-- Centered Form Panel -->
    <main class="form-panel">
        <div class="form-card">
            
            <!-- VIEW: LOGIN -->
            <div class="view active" id="login-view">
                <div class="form-header">
                    <h2>Personnel Login</h2>
                    <p>Authorize your session to continue.</p>
                </div>

                <div class="input-group">
                    <label>Corporate Email</label>
                    <input type="email" class="input-ctrl" placeholder="name@bullgreentrading.com">
                </div>

                <div class="input-group">
                    <label>Security Password</label>
                    <input type="password" class="input-ctrl" placeholder="••••••••">
                </div>

                <div class="form-options">
                    <label class="checkbox-wrap">
                        <input type="checkbox" checked> Keep me active
                    </label>
                    <button class="btn-link" onclick="toggleView('forgot-view')">Forgot credentials?</button>
                </div>

                <button class="btn-primary">
                    Access Workspace
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                </button>
            </div>

            <!-- VIEW: FORGOT PASSWORD -->
            <div class="view" id="forgot-view">
                <div class="back-btn" onclick="toggleView('login-view')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    Back to login
                </div>
                <div class="form-header">
                    <h2>Recover Access</h2>
                    <p>Enter your email to receive recovery instructions.</p>
                </div>

                <div class="input-group">
                    <label>Work Email</label>
                    <input type="email" class="input-ctrl" placeholder="e.g. j.doe@bullgreentrading.com">
                </div>

                <button class="btn-primary">
                    Send Recovery Link
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                </button>
            </div>

        </div>

        <footer class="footer-note">
            Bullgreen trading plc &bull; &copy; 2026 YDY Systems
        </footer>
    </main>
</div>

<script>
    function toggleView(viewId) {
        // Hide all views
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        // Show target view
        document.getElementById(viewId).classList.add('active');
    }
</script>

</body>
</html>
